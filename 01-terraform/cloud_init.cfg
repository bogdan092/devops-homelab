#cloud-config
users:
  - name: bogdan
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin, docker
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

# Enable password authentication for debugging
chpasswd:
  list: |
    bogdan:devops
  expire: false
ssh_pwauth: true

# AUTOMATION: Run these commands on first boot
runcmd:
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - usermod -aG docker bogdan